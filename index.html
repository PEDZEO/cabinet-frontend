<!doctype html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0f1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Loading...</title>
    <script>
      (() => {
        try {
          const THEME_KEY = 'cabinet-theme';
          const ULTIMA_MODE_KEY = 'cabinet_ultima_mode';
          const ULTIMA_THEME_CONFIG_KEY = 'cabinet_ultima_theme_config';
          const storedTheme = localStorage.getItem(THEME_KEY);
          const prefersLight =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
          const theme =
            storedTheme === 'light' || storedTheme === 'dark'
              ? storedTheme
              : prefersLight
                ? 'light'
                : 'dark';
          document.documentElement.classList.remove('light', 'dark');
          document.documentElement.classList.add(theme);
          const meta = document.querySelector('meta[name="theme-color"]');
          if (meta) {
            meta.setAttribute('content', theme === 'light' ? '#fef9f0' : '#0a0f1a');
          }

          const ultimaEnabled = localStorage.getItem(ULTIMA_MODE_KEY) === 'true';
          if (ultimaEnabled) {
            const ultimaRaw = localStorage.getItem(ULTIMA_THEME_CONFIG_KEY);
            const ultimaConfig = ultimaRaw ? JSON.parse(ultimaRaw) : null;
            if (ultimaConfig && typeof ultimaConfig === 'object') {
              const map = [
                ['primaryColor', '--ultima-color-primary'],
                ['primaryTextColor', '--ultima-color-primary-text'],
                ['secondaryColor', '--ultima-color-secondary'],
                ['secondaryTextColor', '--ultima-color-secondary-text'],
                ['navBackgroundColor', '--ultima-color-nav-bg'],
                ['navActiveColor', '--ultima-color-nav-active'],
                ['navTextColor', '--ultima-color-nav-text'],
                ['backgroundTopColor', '--ultima-color-bg-top'],
                ['backgroundBottomColor', '--ultima-color-bg-bottom'],
                ['auraColor', '--ultima-color-aura'],
                ['ringColor', '--ultima-color-ring'],
                ['surfaceColor', '--ultima-color-surface'],
                ['surfaceBorderColor', '--ultima-color-surface-border'],
                ['scrollbarThumbColor', '--ultima-color-scrollbar-thumb'],
                ['scrollbarTrackColor', '--ultima-color-scrollbar-track'],
              ];
              for (const [source, cssVar] of map) {
                const value = ultimaConfig[source];
                if (typeof value === 'string' && value.length > 0) {
                  document.documentElement.style.setProperty(cssVar, value);
                }
              }
              if (ultimaConfig.framesEnabled === true) {
                document.documentElement.classList.add('ultima-frames-enabled');
              }
              document.documentElement.classList.add('ultima-prepaint');
              if (meta && typeof ultimaConfig.backgroundTopColor === 'string') {
                meta.setAttribute('content', ultimaConfig.backgroundTopColor);
              }
            }
          }
        } catch {
          // Ignore prepaint failures and fall back to static theme.
        }
      })();
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      html.dark body {
        background-color: #0a0f1a;
      }
      html.ultima-prepaint body {
        background: linear-gradient(
          165deg,
          color-mix(in srgb, var(--ultima-color-bg-top) 92%, #000) 0%,
          color-mix(in srgb, var(--ultima-color-bg-bottom) 95%, #000) 100%
        );
      }
      html.light body {
        background-color: #f7e7ce;
      }
      #root {
        visibility: hidden;
        opacity: 0;
        transition: opacity 180ms ease;
      }
      html.app-ready #root {
        visibility: visible;
        opacity: 1;
      }
      #app-startup-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        pointer-events: none;
        opacity: 1;
        transition: opacity 220ms ease;
      }
      html.dark #app-startup-overlay {
        background: radial-gradient(circle at 70% 45%, rgba(16, 185, 129, 0.2), #0a0f1a 60%);
      }
      html.light #app-startup-overlay {
        background: radial-gradient(circle at 70% 45%, rgba(16, 185, 129, 0.12), #f7e7ce 60%);
      }
      html.ultima-prepaint #app-startup-overlay {
        background: radial-gradient(
          circle at 70% 45%,
          color-mix(in srgb, var(--ultima-color-aura) 28%, transparent),
          color-mix(in srgb, var(--ultima-color-bg-top) 82%, #000) 60%
        );
      }
      html.app-ready #app-startup-overlay {
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div id="app-startup-overlay" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
